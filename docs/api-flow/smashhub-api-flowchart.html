<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmashHub API Flowchart</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@300;400;600;700;800&display=swap');

  :root {
    --bg: #0a0d12;
    --bg2: #0f1318;
    --bg3: #141920;
    --panel: #161c24;
    --border: #1e2833;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --accent4: #f59e0b;
    --accent5: #ef4444;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; }

  /* HEADER */
  header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(0,212,255,0.05) 0%, transparent 100%);
    display: flex; align-items: center; gap: 20px;
    flex-wrap: wrap;
  }

  .logo {
    font-size: 22px; font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .logo span { font-weight: 300; opacity: 0.6; }

  header p {
    color: var(--text-muted); font-size: 13px;
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
  }

  /* PHASE TABS */
  .tabs {
    display: flex; gap: 4px; padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 8px 18px; border-radius: 6px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
    cursor: pointer; white-space: nowrap;
    border: 1px solid transparent;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .tab:hover { border-color: var(--border); background: var(--bg3); }
  .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .tab[data-phase="auth"] { --c: #00d4ff; }
  .tab[data-phase="tournament"] { --c: #7c3aed; }
  .tab[data-phase="entry"] { --c: #10b981; }
  .tab[data-phase="payment"] { --c: #f59e0b; }
  .tab[data-phase="schedule"] { --c: #06b6d4; }
  .tab[data-phase="match"] { --c: #ef4444; }
  .tab[data-phase="elo"] { --c: #8b5cf6; }
  .tab[data-phase="all"] { --c: #e2e8f0; }
  .tab.active { background: var(--c); color: #000; border-color: var(--c); }

  /* MAIN LAYOUT */
  .main { display: flex; height: calc(100vh - 140px); }

  /* SIDEBAR */
  .sidebar {
    width: 280px; min-width: 280px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 0;
    background: var(--bg2);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .sidebar-section { margin-bottom: 8px; }
  .sidebar-title {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text-muted);
    padding: 6px 20px;
  }

  .flow-item {
    padding: 10px 20px;
    cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    transition: all 0.15s;
    border-left: 2px solid transparent;
  }
  .flow-item:hover { background: var(--bg3); }
  .flow-item.active {
    background: rgba(0,212,255,0.06);
    border-left-color: var(--accent);
  }
  .flow-item .dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }
  .flow-item .name { font-size: 13px; font-weight: 500; }
  .flow-item .count {
    margin-left: auto; font-size: 10px; font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted); background: var(--bg3);
    padding: 1px 6px; border-radius: 10px;
  }

  /* CONTENT */
  .content {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 32px 40px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* FLOW SECTION */
  .flow-section { display: none; }
  .flow-section.active { display: block; }

  .flow-header {
    display: flex; align-items: flex-start;
    gap: 16px; margin-bottom: 32px;
  }

  .phase-badge {
    padding: 6px 14px; border-radius: 20px;
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; white-space: nowrap;
  }

  .flow-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .flow-desc { font-size: 14px; color: var(--text-dim); margin-top: 6px; line-height: 1.6; }

  /* FLOW NODES */
  .flow-nodes { display: flex; flex-direction: column; gap: 0; }

  .flow-row {
    display: flex; align-items: stretch; gap: 0;
    position: relative;
  }

  /* CONNECTOR LINE */
  .flow-connector {
    display: flex; flex-direction: column;
    align-items: center; width: 40px; flex-shrink: 0;
    padding: 0;
  }
  .connector-line {
    width: 2px; background: var(--border);
    flex: 1; min-height: 20px;
  }
  .connector-dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 2px solid; flex-shrink: 0;
    background: var(--bg);
    margin: 0;
  }

  /* NODE CARD */
  .node-card {
    flex: 1; margin: 6px 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .node-card::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 3px; height: 100%;
    border-radius: 10px 0 0 10px;
  }
  .node-card:hover {
    border-color: var(--node-color, var(--accent));
    transform: translateX(3px);
    box-shadow: -4px 0 20px rgba(0,0,0,0.3);
  }
  .node-card.expanded {
    border-color: var(--node-color, var(--accent));
    background: var(--bg3);
  }

  .node-top { display: flex; align-items: center; gap: 10px; }

  .node-step {
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    background: var(--bg2); padding: 2px 7px;
    border-radius: 4px; flex-shrink: 0;
  }

  .node-title { font-size: 14px; font-weight: 700; flex: 1; }

  .node-role {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    font-weight: 600; letter-spacing: 0.3px; flex-shrink: 0;
  }

  .toggle-btn {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg2); color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; flex-shrink: 0;
    transition: all 0.2s;
  }
  .node-card.expanded .toggle-btn {
    background: var(--node-color, var(--accent));
    border-color: var(--node-color, var(--accent));
    color: #000;
    transform: rotate(45deg);
  }

  .node-desc {
    font-size: 12px; color: var(--text-dim);
    margin-top: 6px; margin-left: 0;
    line-height: 1.5;
  }

  .node-apis {
    display: none; margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    flex-direction: column; gap: 6px;
  }
  .node-card.expanded .node-apis { display: flex; }

  .api-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    background: var(--bg2); border-radius: 7px;
    border: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    transition: background 0.15s;
    cursor: default;
  }
  .api-row:hover { background: rgba(0,212,255,0.04); }

  .method {
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
    padding: 2px 7px; border-radius: 4px; flex-shrink: 0;
    min-width: 46px; text-align: center;
  }
  .method.GET { background: rgba(16,185,129,0.15); color: #10b981; }
  .method.POST { background: rgba(0,212,255,0.15); color: #00d4ff; }
  .method.PUT { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .method.DELETE { background: rgba(239,68,68,0.15); color: #ef4444; }
  .method.PATCH { background: rgba(124,58,237,0.15); color: #7c3aed; }

  .api-path { color: var(--text); font-size: 12px; flex: 1; }
  .api-path .param { color: var(--accent); }

  .api-note {
    font-size: 10px; color: var(--text-muted);
    font-family: 'Sora', sans-serif;
    margin-left: auto; white-space: nowrap;
  }

  .api-auto {
    font-size: 10px; background: rgba(124,58,237,0.15);
    color: #a78bfa; padding: 1px 6px; border-radius: 3px;
    font-family: 'Sora', sans-serif; font-weight: 600;
    white-space: nowrap;
  }

  /* BRANCH NODE */
  .branch-row {
    display: flex; gap: 12px; margin: 0; flex: 1;
  }
  .branch-card {
    flex: 1; background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .branch-card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 100%; height: 2px;
  }
  .branch-card:hover { border-color: var(--node-color); }
  .branch-card.expanded { border-color: var(--node-color); background: var(--bg3); }

  .branch-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
    text-transform: uppercase; margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .branch-label .icon { font-size: 14px; }
  .branch-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .branch-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

  .branch-apis {
    display: none; margin-top: 12px;
    padding-top: 12px; border-top: 1px solid var(--border);
    flex-direction: column; gap: 5px;
  }
  .branch-card.expanded .branch-apis { display: flex; }

  /* STATUS FLOW */
  .status-flow {
    display: flex; align-items: center; gap: 0;
    padding: 20px 0; flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .status-chip {
    padding: 6px 14px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
    border: 1px solid;
  }
  .status-arrow {
    font-size: 12px; color: var(--text-muted); padding: 0 8px;
  }

  /* AUTO TRIGGER BOX */
  .auto-triggers {
    background: rgba(124,58,237,0.08);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 10px; padding: 14px 16px;
    margin-top: 8px;
  }
  .auto-triggers-title {
    font-size: 11px; font-weight: 700; color: #a78bfa;
    letter-spacing: 0.5px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .auto-trigger-item {
    font-size: 12px; color: var(--text-dim);
    padding: 3px 0;
    display: flex; align-items: center; gap: 8px;
  }
  .auto-trigger-item::before {
    content: '✦'; color: #a78bfa; font-size: 8px;
  }

  /* TIP BOX */
  .tip-box {
    background: rgba(16,185,129,0.06);
    border: 1px solid rgba(16,185,129,0.2);
    border-radius: 8px; padding: 12px 16px;
    font-size: 12px; color: #6ee7b7;
    margin-top: 8px; line-height: 1.6;
  }
  .tip-box strong { color: #10b981; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ALL FLOWS GRID */
  .all-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px; margin-bottom: 32px;
  }
  .mini-flow {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px;
    cursor: pointer; transition: all 0.2s;
  }
  .mini-flow:hover { border-color: var(--mini-color); transform: translateY(-2px); }
  .mini-flow-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .mini-flow-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--mini-color); }
  .mini-flow-title { font-size: 14px; font-weight: 700; }
  .mini-flow-count { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; margin-left: auto; }
  .mini-flow-steps { display: flex; flex-direction: column; gap: 3px; }
  .mini-step { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  .mini-step::before { content: '→'; color: var(--mini-color); font-size: 10px; }
</style>
</head>
<body>
<div class="wrapper">

<header>
  <div class="logo">SmashHub <span>API</span></div>
  <div style="font-size:13px;color:var(--text-dim)">Interactive API Flowchart — 150+ endpoints</div>
  <p>v1.0 · 2024-04-22</p>
</header>

<div class="tabs" id="tabs">
  <div class="tab active" data-phase="all" onclick="switchPhase('all',this)">🗺 Tổng quan</div>
  <div class="tab" data-phase="auth" onclick="switchPhase('auth',this)">🔐 Auth</div>
  <div class="tab" data-phase="tournament" onclick="switchPhase('tournament',this)">🏆 Tournament</div>
  <div class="tab" data-phase="entry" onclick="switchPhase('entry',this)">📝 Entry</div>
  <div class="tab" data-phase="payment" onclick="switchPhase('payment',this)">💳 Payment</div>
  <div class="tab" data-phase="schedule" onclick="switchPhase('schedule',this)">📅 Schedule</div>
  <div class="tab" data-phase="match" onclick="switchPhase('match',this)">⚽ Match</div>
  <div class="tab" data-phase="elo" onclick="switchPhase('elo',this)">📊 ELO</div>
  <div class="tab" data-phase="referee" onclick="switchPhase('referee',this)">👨‍⚖️ Referee</div>
  <div class="tab" data-phase="fullflow" onclick="switchPhase('fullflow',this)">🔄 Full Flow</div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>

</div>

// FLOW CONTENT DATA
const flowContent = {
  // ALL VIEW - handled separately

  // AUTH
  register: {
    title: 'Đăng ký tài khoản mới',
    desc: 'Flow hoàn chỉnh từ đăng ký → xác thực email → đăng nhập lần đầu',

let currentPhase = 'all';
let currentFlow = null;

function switchPhase(phase, el) {
  currentPhase = phase;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderSidebar();
  renderContent();
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  const phase = phases[currentPhase];
  if (!phase) { sb.innerHTML = ''; return; }

  if (currentPhase === 'all') {
    sb.innerHTML = `<div class="sidebar-section"><div class="sidebar-title">Modules</div>` +
      phase.flows.map(f => `
        <div class="flow-item" onclick="switchPhaseByName('${f.id}')" id="sb-${f.id}">
          <div class="dot" style="background:${f.color}"></div>
          <div class="name">${f.name}</div>
          <div class="count">${f.steps.length} steps</div>
        </div>
      `).join('') + `</div>`;
    return;
  }

  sb.innerHTML = `<div class="sidebar-section"><div class="sidebar-title">${phase.label}</div>` +
    phase.flows.map(f => `
      <div class="flow-item ${currentFlow === f.id ? 'active' : ''}" onclick="showFlow('${f.id}')" id="sb-${f.id}">
        <div class="dot" style="background:${phase.color}"></div>
        <div class="name">${f.name}</div>
      </div>
    `).join('') + `</div>`;
}

function renderContent() {
  if (currentPhase === 'all') {
    renderAllView();
    return;
  }
  if (currentFlow) {
    renderFlow(currentFlow);
  } else {
    // show first flow
    const phase = phases[currentPhase];
    if (phase && phase.flows.length) {
      showFlow(phase.flows[0].id);
    }
  }
}

function renderAllView() {
  const content = document.getElementById('content');
  const phase = phases.all;
  content.innerHTML = `
    <div style="margin-bottom:28px">
      <div style="font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px">SmashHub API — Tổng quan</div>
      <div style="font-size:14px;color:var(--text-dim);line-height:1.6">150+ endpoints được tổ chức theo 8 modules chính. Click vào module để xem chi tiết API flow.</div>
    </div>
    <div class="all-grid">
      ${phase.flows.map(f => `
        <div class="mini-flow" style="--mini-color:${f.color}" onclick="switchPhaseByName('${f.id}')">
          <div class="mini-flow-header">
            <div class="mini-flow-dot"></div>
            <div class="mini-flow-title">${f.name}</div>
            <div class="mini-flow-count">${f.steps.length} flows</div>
          </div>
          <div class="mini-flow-steps">
            ${f.steps.map(s => `<div class="mini-step">${s}</div>`).join('')}
          </div>
        </div>
      `).join('')}
    </div>

    <div style="margin-top:8px;margin-bottom:16px">
      <div style="font-size:16px;font-weight:700;margin-bottom:12px">⏱️ Status Progressions</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        ${renderStatusBar('Tournament', [
          {label:'upcoming',color:'#64748b'},{label:'registration_open',color:'#10b981'},
          {label:'registration_closed',color:'#f59e0b'},{label:'brackets_generated',color:'#06b6d4'},
          {label:'ongoing',color:'#ef4444'},{label:'completed',color:'#8b5cf6'}
        ])}
        ${renderStatusBar('Match', [
          {label:'pending',color:'#64748b'},{label:'ongoing',color:'#06b6d4'},
          {label:'pending_approval',color:'#f59e0b'},{label:'completed',color:'#10b981'}
        ])}
        ${renderStatusBar('Payment', [
          {label:'pending',color:'#64748b'},{label:'confirmed',color:'#10b981'},
          {label:'rejected',color:'#ef4444'},{label:'refunded',color:'#8b5cf6'}
        ])}
        ${renderStatusBar('Entry', [
          {label:'pending',color:'#64748b'},{label:'confirmed',color:'#10b981'},

function renderStatusBar(title, items) {
  return `
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 16px">
      <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px">${title}</div>
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:0">
        ${items.map((item, i) => `
          <div style="padding:4px 12px;border-radius:12px;font-size:11px;font-weight:600;color:${item.color};border:1px solid ${item.color};background:${item.color}18">${item.label}</div>
          ${i < items.length-1 ? '<span style="color:var(--text-muted);padding:0 8px;font-size:12px">→</span>' : ''}
        `).join('')}
      </div>
    </div>
  `;
}

function switchPhaseByName(id) {
  const tabMap = {
    auth: 'auth', tournament: 'tournament', entry: 'entry', payment: 'payment',
    schedule: 'schedule', match: 'match', elo: 'elo', referee: 'referee'
  };
  const phase = tabMap[id] || id;
  const tab = document.querySelector(`.tab[data-phase="${phase}"]`);
  if (tab) {
    currentFlow = null;
    switchPhase(phase, tab);
  }
}

function showFlow(flowId) {
  currentFlow = flowId;
  document.querySelectorAll('.flow-item').forEach(el => el.classList.remove('active'));
  const sb = document.getElementById(`sb-${flowId}`);
  if (sb) sb.classList.add('active');
  renderFlow(flowId);
}

function renderFlow(flowId) {
  const data = flowContent[flowId];
  if (!data) return;
  const content = document.getElementById('content');

  const statusHtml = data.statusFlow ? `
    <div class="status-flow">
      ${data.statusFlow.map((s, i) => `
        <div class="status-chip" style="color:${s.color};border-color:${s.border};background:${s.color}15">${s.label}</div>
        ${i < data.statusFlow.length-1 ? '<span class="status-arrow">→</span>' : ''}
      `).join('')}
    </div>
  ` : '';

  const nodesHtml = data.nodes.map((node, idx) => `
    <div class="flow-row">
      <div class="flow-connector">
        ${idx > 0 ? '<div class="connector-line"></div>' : '<div style="flex:1"></div>'}
        <div class="connector-dot" style="border-color:${data.color};background:${data.color}22"></div>
        <div class="connector-line"></div>
      </div>
      <div class="node-card" style="--node-color:${data.color}" onclick="toggleNode(this)">
        <div class="node-card::before" style="background:${data.color}"></div>
        <div style="position:absolute;top:0;left:0;width:3px;height:100%;background:${data.color};border-radius:10px 0 0 10px;opacity:0.5"></div>
        <div class="node-top">
          <div class="node-step">${node.step}</div>
          <div class="node-title">${node.title}</div>
          <div class="node-role" style="background:${data.roleColor};color:${data.color}">${data.role}</div>
          <div class="toggle-btn">+</div>
        </div>
        ${node.desc ? `<div class="node-desc">${node.desc}</div>` : ''}
        <div class="node-apis">
          ${node.apis.map(api => renderApiRow(api)).join('')}
        </div>
      </div>
    </div>
  `).join('');

  const autoHtml = data.autoTriggers ? `
    <div class="auto-triggers">
      <div class="auto-triggers-title">✦ Auto-triggered sau khi approve</div>
      ${data.autoTriggers.map(t => `<div class="auto-trigger-item">${t}</div>`).join('')}
    </div>
  ` : '';

  const tipHtml = data.tip ? `<div class="tip-box">${data.tip}</div>` : '';

  content.innerHTML = `
    <div class="flow-header">
      <div>
        <div class="flow-title">${data.title}</div>
        <div class="flow-desc">${data.desc}</div>
      </div>
    </div>
    ${statusHtml}
    <div class="flow-nodes">
      ${nodesHtml}
      <div class="flow-row">
        <div class="flow-connector">
          <div class="connector-line"></div>
          <div style="width:2px;flex:1"></div>
        </div>
        <div style="flex:1"></div>
      </div>
    </div>
    ${autoHtml}
    ${tipHtml}
  `;
}

function renderApiRow(api) {
  const pathHtml = api.path.replace(/\{([^}]+)\}/g, '<span class="param">{$1}</span>');
  const autoHtml = api.auto ? `<span class="api-auto">AUTO</span>` : '';
  const noteHtml = api.note ? `<span class="api-note">${api.note}</span>` : '';
  return `
    <div class="api-row">
      <span class="method ${api.method}">${api.method}</span>
      <span class="api-path">/api${pathHtml}</span>
      ${autoHtml}
      ${noteHtml}
    </div>
  `;
}

function toggleNode(card) {
  card.classList.toggle('expanded');
}

// Init
renderSidebar();
renderAllView();
</script>
</body>
</html>
